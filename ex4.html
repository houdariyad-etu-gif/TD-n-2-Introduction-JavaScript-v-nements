<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 4 - Calculatrice Avancée</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 40px;
        }

        h2 {
            color: #2c3e50;
        }

        .calculatrice {
            background-color: #e8e8e8;
            padding: 16px;
            width: 420px;
            border-radius: 6px;
        }

        #ecran {
            width: 100%;
            box-sizing: border-box;
            height: 48px;
            font-size: 20px;
            text-align: right;
            padding: 8px;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .grille {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        button {
            height: 48px;
            font-size: 15px;
            background-color: #d5d5d5;
            border: 1px solid #bbb;
            border-radius: 4px;
            cursor: pointer;
            color: #222;
        }

        button:hover {
            background-color: #c0c0c0;
        }
    </style>
</head>
<body>

    <h2>Exercice 4 : Calculatrice Avancée</h2>

    <div class="calculatrice">
        <input type="text" id="ecran" />
        <div class="grille">
            <button onclick="ajouterChar('(')">(</button>
            <button onclick="ajouterChar(')')">)</button>
            <button onclick="ajouterChar('%')">%</button>
            <button onclick="effacer()">CE</button>

            <button onclick="ajouterChar('1/')">Inv</button>
            <button onclick="ajouterChar('sin(')">sin</button>
            <button onclick="ajouterChar('ln(')">ln</button>
            <button onclick="ajouterChar('7')">7</button>
            <button onclick="ajouterChar('8')">8</button>
            <button onclick="ajouterChar('9')">9</button>
            <button onclick="ajouterChar('/')">÷</button>

            <button onclick="ajouterChar('π')">π</button>
            <button onclick="ajouterChar('cos(')">cos</button>
            <button onclick="ajouterChar('log(')">log</button>
            <button onclick="ajouterChar('4')">4</button>
            <button onclick="ajouterChar('5')">5</button>
            <button onclick="ajouterChar('6')">6</button>
            <button onclick="ajouterChar('*')">×</button>

            <button onclick="ajouterChar('2.71828')">e</button>
            <button onclick="ajouterChar('tan(')">tan</button>
            <button onclick="ajouterChar('√(')">√</button>
            <button onclick="ajouterChar('3')">3</button>
            <button onclick="ajouterChar('2')">2</button>
            <button onclick="ajouterChar('1')">1</button>
            <button onclick="ajouterChar('-')">-</button>

            <button onclick="ajouterChar('*10^')">EXP</button>
            <button onclick="ajouterChar('^2')">x²</button>
            <button onclick="ajouterChar('^')">x^</button>
            <button onclick="ajouterChar('.')">.</button>
            <button onclick="ajouterChar('0')">0</button>
            <button onclick="calculerResultat()">=</button>
            <button onclick="ajouterChar('+')">+</button>
        </div>
    </div>

    <script>

        function ajouterChar(valeur) {
            document.getElementById("ecran").value += valeur;
        }

        function effacer() {
            document.getElementById("ecran").value = "";
        }

        function calculerResultat() {
            var ecran = document.getElementById("ecran");
            var expression = ecran.value;

            expression = expression.replaceAll("sin(", "Math.sin(");
            expression = expression.replaceAll("cos(", "Math.cos(");
            expression = expression.replaceAll("tan(", "Math.tan(");
            expression = expression.replaceAll("ln(",  "Math.log(");
            expression = expression.replaceAll("log(", "Math.log10(");
            expression = expression.replaceAll("√(",   "Math.sqrt(");
            expression = expression.replaceAll("π",    "Math.PI");
            expression = expression.replaceAll("^",    "**");

            try {
                ecran.value = eval(expression);
            } catch (err) {
                ecran.value = "Erreur de saisie";
            }
        }

    </script>

</body>
</html>
